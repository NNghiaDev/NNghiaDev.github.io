<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xin Lỗi Nga</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fce4ec;
            color: #880e4f;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #d81b60;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .heart {
            font-size: 50px;
            color: #e91e63;
            margin-top: 20px;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Xin lỗi Nga</h1>
        <p>Mình biết là mình đã sai. Mong bạn có thể tha thứ cho mình. ❤️</p>
        <div class="heart">💖</div>
    </div>
</body>
</html>
